name: ps_salon
description: "PSSalon booking and services app."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  url_launcher: ^6.2.6
  firebase_core: 3.15.2
  cloud_firestore: 5.6.12
  firebase_auth: 5.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/gallery/
  fonts:
    - family: PlayfairDisplay
      fonts:
        - asset: assets/fonts/PlayfairDisplay[wght].ttf
    - family: Sora
      fonts:
        - asset: assets/fonts/Sora[wght].ttf
